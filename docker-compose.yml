services:
  web:
    build: 
      context: .
      # Đã xóa 'target: deps' để Docker chạy trọn vẹn đến stage cuối cùng (runner) trong Dockerfile
    
    ports:
      - "3000:3000"
    
    environment:
      # Không cần khai báo NODE_ENV vì trong Dockerfile đã set sẵn là production
      - DATABASE_URL=postgresql://admin:secretpassword@db:5432/khongmatuy_db
    
    # Đã XÓA TOÀN BỘ volumes: Không mount source code từ ngoài vào nữa, 
    # code đã được "đóng băng" bên trong image khi build.
    
    # Đã XÓA command: Không chạy npm run docker:dev nữa. 
    # Container sẽ tự động dùng lệnh CMD ["node", "server.js"] trong Dockerfile.
             
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: khongmatuy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d khongmatuy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
# Đã xóa node_modules_vol và next_vol vì không còn dùng tới ở Production