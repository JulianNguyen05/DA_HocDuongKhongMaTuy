services:
  web:
    build: 
      context: .
      target: deps # Chỉ lấy stage cài thư viện, source code sẽ được map từ máy thật vào
    ports:
      - "3000:3000"
    
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - DATABASE_URL=postgresql://admin:secretpassword@db:5432/khongmatuy_db
    
    volumes:
      - .:/app
      - node_modules_vol:/app/node_modules
      - next_vol:/app/.next
    
    # ĐÂY LÀ CHÌA KHÓA: Generate client -> Đẩy schema lên DB (tạo bảng) -> Chạy Dev
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"
             
    depends_on:
      db:
        condition: service_healthy # Bắt buộc đợi DB "khỏe mạnh" thì web mới chạy

  db:
    image: postgres:15
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: khongmatuy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Kiểm tra xem Postgres đã thực sự sẵn sàng nhận kết nối chưa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d khongmatuy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  node_modules_vol:
  next_vol: