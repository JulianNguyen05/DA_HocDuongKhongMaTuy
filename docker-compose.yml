services:
  # 1. Container DB khởi động đầu tiên
  db:
    image: postgres:15
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: khongmatuy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d khongmatuy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Container "Mồi" - Chạy 1 lần rồi tắt
  setup-db:
    build: 
      context: .
      target: builder # Sử dụng stage 'builder' trong Dockerfile vì nó có chứa sẵn Prisma và Source code
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@db:5432/khongmatuy_db
    # Lệnh này sẽ đẩy cấu trúc bảng và nạp dữ liệu mẫu
    command: sh -c "npx prisma db push && npx prisma db seed"
    depends_on:
      db:
        condition: service_healthy # Chỉ bắt đầu khi DB đã khỏe mạnh

  # 3. Container Web chính (Siêu nhẹ)
  web:
    build: 
      context: .
      # Không cần target, nó sẽ đi thẳng đến stage 'runner' cuối cùng
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@db:5432/khongmatuy_db
    depends_on:
      setup-db:
        condition: service_completed_successfully # BẮT BUỘC đợi container 'setup-db' hoàn thành công việc và tắt đi

volumes:
  postgres_data: